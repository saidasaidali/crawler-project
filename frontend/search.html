<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recherche - Web Crawler</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- Barre de navigation -->
<nav class="topbar">
    <div class="logo">📶 Maroc Telecom AI</div>
    <div class="menu">
        <a href="home.html">Accueil</a>
        <a href="sources.html">Sources</a>
        <a href="search.html" class="active">Recherche</a>
        <a href="chatbot.html">Chatbot</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</nav>

<!-- Contenu -->
<div class="container">
    <div class="search-section">
        <div class="search-box">
            <input id="keyword" type="text" placeholder="Ex: AI, cybersecurity, cloud..." />
            <button onclick="search()"><i class="fas fa-search"></i> Rechercher</button>
        </div>
        
        <div class="filter-section">
            <h3><i class="fas fa-filter"></i> Filtrer par mots-clés de sources</h3>
            <div id="keywords-filter" class="keywords-filter">
                <p class="loading">Chargement des mots-clés...</p>
            </div>
            <div class="selected-keywords" id="selected-keywords"></div>
        </div>
    </div>

    <div id="results" class="results"></div>
</div>

<script>
let selectedKeywords = [];

async function loadKeywords() {
    try {
        const response = await fetch('http://localhost:5000/keywords');
        const keywordsMap = await response.json();
        
        const filterDiv = document.getElementById('keywords-filter');
        filterDiv.innerHTML = '';
        
        if (Object.keys(keywordsMap).length === 0) {
            filterDiv.innerHTML = '<p class="empty-state">Aucun mot-clé défini dans les sources.</p>';
            return;
        }
        
        const keywordsList = Object.keys(keywordsMap).sort();
        
        keywordsList.forEach(keyword => {
            const sources = keywordsMap[keyword];
            const keywordBtn = document.createElement('button');
            keywordBtn.className = 'keyword-btn';
            keywordBtn.textContent = `${keyword} (${sources.length})`;
            keywordBtn.title = `Sources: ${sources.join(', ')}`;
            keywordBtn.onclick = () => toggleKeyword(keyword);
            filterDiv.appendChild(keywordBtn);
        });
        
    } catch (error) {
        console.error('Erreur lors du chargement des mots-clés:', error);
        document.getElementById('keywords-filter').innerHTML = '<p class="error">Erreur de chargement des mots-clés.</p>';
    }
}

function toggleKeyword(keyword) {
    const index = selectedKeywords.indexOf(keyword);
    if (index > -1) {
        selectedKeywords.splice(index, 1);
    } else {
        selectedKeywords.push(keyword);
    }
    updateSelectedKeywordsDisplay();
    updateKeywordButtons();
}

function updateSelectedKeywordsDisplay() {
    const selectedDiv = document.getElementById('selected-keywords');
    selectedDiv.innerHTML = '';
    
    if (selectedKeywords.length === 0) {
        selectedDiv.innerHTML = '<p class="no-selection">Aucun mot-clé sélectionné (recherche dans toutes les sources)</p>';
        return;
    }
    
    selectedKeywords.forEach(keyword => {
        const tag = document.createElement('span');
        tag.className = 'keyword-tag';
        tag.innerHTML = `${keyword} <i class="fas fa-times" onclick="toggleKeyword('${keyword}')"></i>`;
        selectedDiv.appendChild(tag);
    });
}

function updateKeywordButtons() {
    const buttons = document.querySelectorAll('.keyword-btn');
    buttons.forEach(btn => {
        const keyword = btn.textContent.split(' (')[0];
        if (selectedKeywords.includes(keyword)) {
            btn.classList.add('selected');
        } else {
            btn.classList.remove('selected');
        }
    });
}

function search() {
    const q = document.getElementById("keyword").value.trim();
    const resultsDiv = document.getElementById("results");

    if (!q) {
        alert("Entrez un mot-clé");
        return;
    }

    resultsDiv.innerHTML = '<p class="loading"><i class="fas fa-spinner"></i> Recherche en cours...</p>';

    // Construire l'URL avec les paramètres
    let url = `http://localhost:5000/search?q=${encodeURIComponent(q)}`;
    if (selectedKeywords.length > 0) {
        selectedKeywords.forEach(keyword => {
            url += `&source_keywords=${encodeURIComponent(keyword)}`;
        });
    }

    fetch(url)
        .then(res => res.json())
        .then(data => {
            resultsDiv.innerHTML = "";

            if (!Array.isArray(data) || data.length === 0) {
                resultsDiv.innerHTML = "<p class='empty-state'><i class='fas fa-magnifying-glass'></i>Aucun résultat trouvé.</p>";
                return;
            }

            data.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "result-card";

                const snippet = (item.content || "").substring(0, 300);
                const fullContent = item.content || "";

                div.innerHTML = `
                    <h3>🌐 ${item.url}</h3>
                    <p><b>Source:</b> ${item.source || "N/A"}</p>
                    <p><b>Date:</b> ${item.crawled_at ? new Date(item.crawled_at).toLocaleString() : "?"}</p>
                    <p><b>Mots-clés:</b> ${(item.keywords && item.keywords.length > 0) ? item.keywords.join(", ") : "Aucun"}</p>
                    <p id="snippet-${idx}">${snippet}${fullContent.length > 300 ? "..." : ""}</p>
                    ${fullContent.length > 300 ? `<button class="show-more-btn" onclick="toggleContent(${idx}, \`${fullContent.replace(/`/g, '\\`')}\`)">Voir plus</button>` : ""}
                `;

                resultsDiv.appendChild(div);
            });
        })
        .catch(err => {
            console.error(err);
            resultsDiv.innerHTML = "<p>❌ Erreur lors de la recherche</p>";
        });
}

function toggleContent(idx, fullText) {
    const p = document.getElementById(`snippet-${idx}`);
    const btn = p.nextElementSibling;
    if (p.textContent.endsWith("...")) {
        p.textContent = fullText;
        if (btn) btn.textContent = "Voir moins";
    } else {
        p.textContent = fullText.substring(0, 300) + "...";
        if (btn) btn.textContent = "Voir plus";
    }
}

// Charger les mots-clés au chargement de la page
loadKeywords();
</script>

</body>
</html>
