<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard d'Analyse des Données</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
</head>
<body>

<nav class="topbar">
    <div class="logo">📶 Maroc Telecom AI</div>
    <div class="menu">
        <a href="home.html">Accueil</a>
        <a href="sources.html">Sources</a>
        <a href="search.html">Recherche</a>
        <a href="chatbot.html">Chatbot</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</nav>

<h1>Dashboard d'Analyse des Données Collectées</h1>
<div id="analytics-container">
    <div class="metric-card">
        <h3>Total Pages Crawlées</h3>
        <p id="total-pages">Chargement...</p>
    </div>
    
    <div class="chart-container">
        <h3>Pages par Source</h3>
        <canvas id="pages-per-source-chart"></canvas>
    </div>
    
    <div class="chart-container">
        <h3>Fréquence des Mots-Clés</h3>
        <canvas id="keyword-frequency-chart"></canvas>
    </div>
    
    <div class="chart-container">
        <h3>Tendances de Crawling</h3>
        <canvas id="crawl-trends-chart"></canvas>
    </div>
    
    <div class="recent-crawls">
        <h3>Crawls Récentes</h3>
        <ul id="recent-list"></ul>
    </div>
</div>

<script>
async function fetchData(url) {
    try {
        const response = await fetch(url);
        return await response.json();
    } catch (error) {
        console.error('Erreur lors de la récupération des données:', error);
        return null;
    }
}

async function loadAnalytics() {
    // Total pages
    const totalData = await fetchData('http://localhost:5000/analytics/total_pages');
    if (totalData) {
        document.getElementById('total-pages').textContent = totalData.total_pages;
    }
    
    // Pages per source
    const pagesData = await fetchData('http://localhost:5000/analytics/pages_per_source');
    if (pagesData) {
        createChart('pages-per-source-chart', 'bar', 'Pages par Source', pagesData);
    }
    
    // Keyword frequency
    const keywordData = await fetchData('http://localhost:5000/analytics/keyword_frequency');
    if (keywordData) {
        createChart('keyword-frequency-chart', 'bar', 'Fréquence des Mots-Clés', keywordData);
    }
    
    // Crawl trends
    const trendsData = await fetchData('http://localhost:5000/analytics/crawl_trends');
    if (trendsData) {
        createChart('crawl-trends-chart', 'line', 'Tendances de Crawling', trendsData);
    }
    
    // Recent crawls
    const recentData = await fetchData('http://localhost:5000/analytics/recent_crawls');
    if (recentData) {
        const list = document.getElementById('recent-list');
        list.innerHTML = '';
        recentData.forEach(item => {
            const li = document.createElement('li');
            li.textContent = `${item.url} - ${new Date(item.crawled_at).toLocaleString()}`;
            list.appendChild(li);
        });
    }
}

function createChart(canvasId, type, title, data) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    new Chart(ctx, {
        type: type,
        data: {
            labels: Object.keys(data),
            datasets: [{
                label: title,
                data: Object.values(data),
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true },
                title: { display: true, text: title, font: { size: 16 } }
            }
        }
    });
}

loadAnalytics();
</script>

</body>
</html>

</script>

</body>
</html>
